AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Notohub backend — single Lambda function behind an HTTP API Gateway.

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:
  DynamoDBTableName:
    Type: String
    Default: notohub-articles-production
  S3BucketName:
    Type: String
    Default: www.notohub.com
  S3BucketRegion:
    Type: String
    Default: us-east-1
    Description: >
      Region the content bucket actually lives in (independent of the stack's
      own region) — required for correctly signed presigned URLs.
  AllowedOrigin:
    Type: String
    Default: https://app.notohub.com
    Description: CORS allowed origin for the frontend app
  CognitoUserPoolId:
    Type: String
    Description: "Cognito User Pool ID (e.g. ap-southeast-1_xxxxxxxxx)"
  CognitoAppClientId:
    Type: String
    Description: Cognito App Client ID
  CognitoRegion:
    Type: String
    Default: ap-southeast-1
    Description: Region where the Cognito User Pool lives
  NotionClientId:
    Type: String
    Description: Notion OAuth app client ID
  NotionClientSecret:
    Type: String
    NoEcho: true
    Description: Notion OAuth app client secret
  NotionRedirectUri:
    Type: String
    Default: https://api.notohub.com/auth/notion/callback
    Description: OAuth redirect URI registered with Notion (production URL)
  PublicApiUrl:
    Type: String
    Default: https://api.notohub.com
    Description: Public API base URL embedded in generated article HTML for the "More from" fetch

# ── Globals ───────────────────────────────────────────────────────────────────
Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: python3.12
    Handler: handler.handler

# ── Resources ─────────────────────────────────────────────────────────────────
Resources:

  # HTTP API — CORS is handled inside Lambda, so no CorsConfiguration here.
  # All routes proxy to NotohubFunction via PayloadFormatVersion 1.0 so that
  # the Lambda event shape matches our local handler (httpMethod / path fields).
  NotohubApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Description: Notohub REST API

  NotohubFunction:
    Type: AWS::Serverless::Function
    # Custom build via Makefile — excludes .env, run_local.py, and other
    # local-only files from the Lambda package.
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref DynamoDBTableName
          S3_BUCKET_NAME: !Ref S3BucketName
          S3_BUCKET_REGION: !Ref S3BucketRegion
          # AWS_REGION is injected automatically by the Lambda runtime.
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId
          COGNITO_REGION: !Ref CognitoRegion
          PUBLIC_API_URL: !Ref PublicApiUrl
          NOTION_CLIENT_ID: !Ref NotionClientId
          NOTION_CLIENT_SECRET: !Ref NotionClientSecret
          NOTION_REDIRECT_URI: !Ref NotionRedirectUri
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Sid: DynamoDB
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}'
                - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}/index/*'
            - Sid: S3
              Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'
            # Lets the function invoke itself asynchronously to run slow publish
            # jobs in the background (API Gateway hard-caps at 29s; Lambda can
            # run up to Globals.Timeout). Wildcarded on the SAM-generated name
            # pattern ({stack}-NotohubFunction-{suffix}) instead of !GetAtt/!Ref
            # on this same resource, which would be a circular dependency.
            - Sid: SelfInvokeAsync
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-NotohubFunction-*'
      Events:
        # Catch-all for any path with segments
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref NotohubApi
            Path: /{proxy+}
            Method: ANY
            PayloadFormatVersion: '1.0'
        # Root path (API Gateway doesn't match /{proxy+} for /)
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref NotohubApi
            Path: /
            Method: ANY
            PayloadFormatVersion: '1.0'

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: >
      HTTP API endpoint URL.
      Point NEXT_PUBLIC_API_URL here until api.notohub.com is configured.
    Value: !Sub 'https://${NotohubApi}.execute-api.${AWS::Region}.amazonaws.com'
  FunctionName:
    Description: Lambda function name (for aws lambda update-function-code)
    Value: !Ref NotohubFunction
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt NotohubFunction.Arn
